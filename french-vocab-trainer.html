<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Français daily</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg2: #f5f4f1; --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue: #185FA5; --blue-bg: #E6F1FB; --blue-text: #185FA5;
    --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #97C459;
    --red-bg: #FAECE7; --red-text: #4A1B0C; --red-border: #F0997B;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --text: #f0efe8; --text2: #a0a09a; --text3: #6b6b65;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue: #85B7EB; --blue-bg: #0c1f33; --blue-text: #85B7EB;
      --green-bg: #172804; --green-text: #C0DD97; --green-border: #3B6D11;
      --red-bg: #2a0e06; --red-text: #F0997B; --red-border: #993C1D;
    }
  }

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  #app { max-width: 520px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .screen { display: none; }
  .screen.active { display: block; }

  /* HOME */
  .home-top { margin-bottom: 2.5rem; }
  .home-top h1 { font-size: 22px; font-weight: 500; }
  .home-top p { font-size: 14px; color: var(--text2); margin-top: 4px; }
  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2.5rem; }
  .stat-card { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .start-area { text-align: center; }
  .start-btn { display: inline-block; padding: 14px 40px; border-radius: var(--radius-lg); border: 0.5px solid var(--border2); background: none; cursor: pointer; font-size: 16px; font-weight: 500; color: var(--text); font-family: inherit; transition: background 0.12s; }
  .start-btn:hover { background: var(--bg2); }
  .start-sub { margin-top: 10px; font-size: 13px; color: var(--text3); min-height: 20px; }

  /* QUIZ */
  .quiz-header { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .back-btn { font-size: 14px; background: none; border: none; cursor: pointer; color: var(--text2); padding: 0; font-family: inherit; }
  .quiz-count { font-size: 13px; color: var(--text2); flex: 1; text-align: right; }
  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 1.75rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--blue); border-radius: 2px; transition: width 0.35s cubic-bezier(.4,0,.2,1); }
  .question-type { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .mc-question { background: var(--bg2); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1.25rem; min-height: 110px; display: flex; align-items: center; justify-content: center; }
  .mc-q-text { font-size: 24px; font-weight: 500; text-align: center; line-height: 1.35; }
  .mc-q-hint { font-size: 13px; color: var(--text2); text-align: center; margin-top: 8px; }
  .mc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.25rem; }
  .mc-opt { padding: 14px 16px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); cursor: pointer; font-size: 14px; color: var(--text); text-align: left; line-height: 1.4; transition: all 0.12s; font-family: inherit; }
  .mc-opt:hover:not([disabled]) { background: var(--bg2); }
  .mc-opt.correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .mc-opt.wrong { background: var(--red-bg); border-color: var(--red-border); color: var(--red-text); }
  .mc-opt.reveal-correct { background: var(--green-bg); border-color: var(--green-border); color: var(--green-text); }
  .mc-feedback { font-size: 14px; text-align: center; min-height: 22px; margin-bottom: 1rem; }
  .next-btn { width: 100%; padding: 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; font-size: 14px; font-weight: 500; color: var(--text); transition: all 0.12s; font-family: inherit; }
  .next-btn:hover { background: var(--bg2); }
  .next-btn:disabled { opacity: 0.35; cursor: default; }

  /* RESULTS */
  .results-wrap { text-align: center; padding: 0.5rem 0; }
  .results-score { font-size: 60px; font-weight: 500; line-height: 1; margin-bottom: 6px; }
  .results-fraction { font-size: 15px; color: var(--text2); margin-bottom: 8px; }
  .results-msg { font-size: 16px; margin-bottom: 2rem; }
  .results-actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .results-btn { padding: 10px 22px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: none; cursor: pointer; font-size: 14px; color: var(--text); font-family: inherit; transition: background 0.12s; }
  .results-btn:hover { background: var(--bg2); }
  .missed-list { text-align: left; margin-top: 2rem; }
  .missed-title { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
  .missed-item { padding: 9px 12px; border-radius: var(--radius); background: var(--bg2); font-size: 13px; margin-bottom: 6px; display: flex; justify-content: space-between; gap: 12px; }
  .missed-fr { font-weight: 500; }
  .missed-en { color: var(--text2); }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-top">
      <h1>Français daily</h1>
      <p>25 questions · mixed EN↔FR · weighted to recent words</p>
    </div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Total words</div><div class="stat-val" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-val" id="stat-sessions">0</div></div>
      <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-val" id="stat-streak">0</div></div>
    </div>
    <div class="start-area">
      <button class="start-btn" onclick="startSession()">Start today's lesson →</button>
      <div class="start-sub" id="home-sub"></div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-header">
      <button class="back-btn" onclick="goHome()">← Home</button>
      <div class="quiz-count" id="quiz-count">1 / 25</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="quiz-bar" style="width:0%"></div></div>
    <div class="question-type" id="q-type"></div>
    <div class="mc-question">
      <div style="width:100%">
        <div class="mc-q-text" id="mc-q"></div>
        <div class="mc-q-hint" id="mc-hint"></div>
      </div>
    </div>
    <div class="mc-options" id="mc-options"></div>
    <div class="mc-feedback" id="mc-feedback"></div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" disabled>Next →</button>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="results-wrap">
      <div class="results-score" id="res-pct"></div>
      <div class="results-fraction" id="res-fraction"></div>
      <div class="results-msg" id="res-msg"></div>
      <div class="results-actions">
        <button class="results-btn" onclick="goHome()">← Home</button>
        <button class="results-btn" id="retry-btn" onclick="retryMissed()" style="display:none">Retry missed →</button>
      </div>
      <div class="missed-list" id="missed-list"></div>
    </div>
  </div>

</div>

const SESSION_SIZE  = 25;
const RECENT_RATIO  = 0.60; // 60% of questions from recent words
const RECENT_CUTOFF = 0.40; // bottom 40% of array = "recent"

function getWeightedSelection(n) {
  const total      = VOCAB.length;
  const splitAt    = Math.floor(total * (1 - RECENT_CUTOFF));
  const recentPool = VOCAB.slice(splitAt);
  const olderPool  = VOCAB.slice(0, splitAt);

  const nRecent = Math.round(n * RECENT_RATIO);
  const nOlder  = n - nRecent;

  function pick(pool, count) {
    if (pool.length === 0) return [];
    const s = shuffle([...pool]);
    const out = [];
    while (out.length < count) out.push(...s.slice(0, Math.min(s.length, count - out.length)));
    return out.slice(0, count);
  }

  return shuffle([...pick(recentPool, nRecent), ...pick(olderPool, nOlder)]);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Persistence ────────────────────────────────────────────────
let sessions = parseInt(localStorage.getItem('fr_sessions') || '0');
let streak   = parseInt(localStorage.getItem('fr_streak')   || '0');
let lastDate = localStorage.getItem('fr_lastdate') || '';

function recordSession() {
  sessions++;
  localStorage.setItem('fr_sessions', sessions);
  const today = new Date().toDateString();
  if (lastDate !== today) {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    if (lastDate !== yesterday.toDateString()) streak = 0;
    streak++;
    lastDate = today;
    localStorage.setItem('fr_streak',  streak);
    localStorage.setItem('fr_lastdate', today);
  }
}

function updateHomeStats() {
  document.getElementById('stat-total').textContent    = VOCAB.length;
  document.getElementById('stat-sessions').textContent = sessions;
  // Recalc streak freshness
  const today = new Date().toDateString();
  if (lastDate && lastDate !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (lastDate !== yesterday.toDateString()) streak = 0;
  }
  document.getElementById('stat-streak').textContent = streak > 0 ? streak + ' 🔥' : '0';
  document.getElementById('home-sub').textContent =
    lastDate === new Date().toDateString()
      ? "You've already practiced today — nice work."
      : '';
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { show('screen-home'); updateHomeStats(); }

// ── Session state ──────────────────────────────────────────────
let queue = [], qIdx = 0, score = 0, missed = [], isRetry = false;
// Store direction per question so next button always knows
let currentDirection = true; // true = EN→FR

function startSession() {
  queue = getWeightedSelection(SESSION_SIZE);
  qIdx = 0; score = 0; missed = []; isRetry = false;
  show('screen-quiz');
  renderQuestion();
}

function retryMissed() {
  queue = shuffle([...missed]);
  qIdx = 0; score = 0; missed = []; isRetry = true;
  show('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  if (qIdx >= queue.length) { endSession(); return; }

  const item  = queue[qIdx];
  const enToFr = Math.random() < 0.5;
  currentDirection = enToFr;

  document.getElementById('q-type').textContent      = enToFr ? 'EN → FR' : 'FR → EN';
  document.getElementById('mc-q').textContent        = enToFr ? item.en : item.fr;
  document.getElementById('mc-hint').textContent     = item.cat + (item.note ? ' · ' + item.note : '');
  document.getElementById('quiz-count').textContent  = (qIdx + 1) + ' / ' + queue.length;
  document.getElementById('quiz-bar').style.width    = (qIdx / queue.length * 100) + '%';
  document.getElementById('mc-feedback').textContent = '';
  document.getElementById('mc-feedback').style.color = 'var(--text2)';
  document.getElementById('next-btn').disabled       = true;
  document.getElementById('next-btn').textContent    = qIdx === queue.length - 1 ? 'See results →' : 'Next →';

  // 4 options: correct + 3 random wrong
  const wrongs = shuffle(VOCAB.filter(v => v !== item)).slice(0, 3);
  const opts   = shuffle([item, ...wrongs]);

  const container = document.getElementById('mc-options');
  container.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className   = 'mc-opt';
    btn.textContent = enToFr ? o.fr : o.en;
    btn.onclick = () => handleAnswer(btn, o === item, item, enToFr);
    container.appendChild(btn);
  });
}

function handleAnswer(btn, correct, item, enToFr) {
  // Prevent double-tap
  if (document.getElementById('next-btn').disabled === false) return;
  // Reveal all options
  document.querySelectorAll('.mc-opt').forEach(b => {
    b.disabled = true;
    if (b.textContent === (enToFr ? item.fr : item.en)) b.classList.add('reveal-correct');
  });
  const fb = document.getElementById('mc-feedback');
  if (correct) {
    btn.classList.add('correct');
    fb.textContent = '✓ Correct!';
    fb.style.color = 'var(--green-text)';
    score++;
  } else {
    btn.classList.add('wrong');
    fb.textContent = '✗  ' + (enToFr ? item.fr : item.en);
    fb.style.color = 'var(--red-text)';
    missed.push(item);
  }
  document.getElementById('next-btn').disabled = false;
}

function nextQuestion() { qIdx++; renderQuestion(); }

function endSession() {
  if (!isRetry) recordSession();
  show('screen-results');

  const pct = Math.round(score / queue.length * 100);
  document.getElementById('res-pct').textContent      = pct + '%';
  document.getElementById('res-fraction').textContent = score + ' of ' + queue.length + ' correct';
  document.getElementById('res-msg').textContent      = getLabel(pct);
  document.getElementById('retry-btn').style.display  = missed.length > 0 ? 'inline-block' : 'none';

  const ml = document.getElementById('missed-list');
  ml.innerHTML = '';
  if (missed.length > 0) {
    ml.innerHTML = '<div class="missed-title">Missed</div>';
    missed.forEach(m => {
      ml.innerHTML += `<div class="missed-item"><span class="missed-fr">${m.fr}</span><span class="missed-en">${m.en}</span></div>`;
    });
  }
}

function getLabel(pct) {
  if (pct === 100) return 'Perfect! 🎉';
  if (pct >= 90)   return 'Excellent work';
  if (pct >= 75)   return 'Good session';
  if (pct >= 55)   return 'Keep at it';
  return 'More practice needed';
}

// ── Init ───────────────────────────────────────────────────────
updateHomeStats();
