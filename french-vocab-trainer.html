<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff; --bg2: #f5f4f1; --bg3: #ededea;
    --text: #1a1a18; --text2: #6b6b67; --text3: #a0a09c;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --green-bg: #EAF3DE; --green-text: #27500A; --green-border: #97C459;
    --red-bg: #FAECE7; --red-text: #993C1D; --red-border: #F0997B;
    --radius: 8px; --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #f0efe8; --text2: #a0a09a; --text3: #6b6b65;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --green-bg: #172804; --green-text: #C0DD97; --green-border: #3B6D11;
      --red-bg: #2a0e06; --red-text: #F0997B; --red-border: #993C1D;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }
  #app { max-width: 480px; margin: 0 auto; padding: 2rem 1.25rem 4rem; padding-top: max(2rem, env(safe-area-inset-top)); padding-bottom: max(4rem, env(safe-area-inset-bottom)); }
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HOME ─────────────────────────────────────────────────── */
  .home-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .home-sub   { font-size: 14px; color: var(--text2); margin-bottom: 2.5rem; }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 2.5rem; }
  .stat-card  { background: var(--bg2); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
  .stat-val   { font-size: 22px; font-weight: 500; }

  .start-wrap { text-align: center; }
  .start-btn  {
    padding: 14px 44px; border-radius: var(--radius-lg);
    border: 0.5px solid var(--border2); background: none;
    cursor: pointer; font-size: 16px; font-weight: 500;
    color: var(--text); font-family: inherit; transition: background 0.12s;
  }
  .start-btn:hover { background: var(--bg2); }
  .start-note { margin-top: 10px; font-size: 13px; color: var(--text3); min-height: 20px; }

  /* ── FLASHCARD SCREEN ─────────────────────────────────────── */
  .fc-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1rem;
  }
  .back-btn {
    font-size: 14px; background: none; border: none;
    cursor: pointer; color: var(--text2); padding: 0; font-family: inherit;
  }
  .fc-count { font-size: 13px; color: var(--text2); flex: 1; text-align: right; }

  .progress-bar  { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 2rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--text3); border-radius: 2px; transition: width 0.3s cubic-bezier(.4,0,.2,1); }

  /* Card flip */
  .card-scene { perspective: 900px; height: 240px; margin-bottom: 1.5rem; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .card       { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.42s cubic-bezier(.4,0,.2,1); }
  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    background: var(--bg2); border-radius: var(--radius-lg);
    border: 0.5px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.75rem; text-align: center;
  }
  .card-back { transform: rotateY(180deg); }

  .card-eyebrow { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
  .card-word    { font-size: 26px; font-weight: 500; line-height: 1.3; color: var(--text); }
  .card-note    { font-size: 13px; color: var(--text2); margin-top: 10px; }
  .card-cat     {
    font-size: 11px; color: var(--text2);
    background: var(--bg3); border-radius: 999px;
    padding: 3px 10px; margin-bottom: 14px;
  }

  .tap-hint { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 1.25rem; }

  /* Grade buttons — hidden until card is flipped */
  .grade-row { display: flex; gap: 10px; }
  .grade-btn {
    flex: 1; padding: 14px; border-radius: var(--radius);
    border: 0.5px solid var(--border2); background: none;
    cursor: pointer; font-size: 15px; font-weight: 500;
    font-family: inherit; transition: all 0.12s;
  }
  .grade-btn.missed { color: var(--red-text); border-color: var(--red-border); }
  .grade-btn.missed:hover { background: var(--red-bg); }
  .grade-btn.got-it { color: var(--green-text); border-color: var(--green-border); }
  .grade-btn.got-it:hover { background: var(--green-bg); }

  /* ── RESULTS ──────────────────────────────────────────────── */
  .results-wrap { padding: 0.5rem 0; }
  .results-done { font-size: 22px; font-weight: 500; margin-bottom: 6px; }
  .results-meta { font-size: 14px; color: var(--text2); margin-bottom: 2rem; }

  .results-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .results-btn {
    padding: 11px 22px; border-radius: var(--radius);
    border: 0.5px solid var(--border2); background: none;
    cursor: pointer; font-size: 14px; color: var(--text);
    font-family: inherit; transition: background 0.12s;
  }
  .results-btn:hover { background: var(--bg2); }

  .missed-section { margin-top: 2rem; }
  .missed-label   { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 10px; }
  .missed-item    {
    padding: 10px 12px; border-radius: var(--radius);
    background: var(--bg2); font-size: 13px;
    margin-bottom: 6px; display: flex;
    justify-content: space-between; align-items: center; gap: 12px;
  }
  .missed-fr { font-weight: 500; margin-bottom: 2px; }
  .missed-en { color: var(--text2); }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-title">Français daily</div>
    <div class="home-sub">See English · say French · flip to check</div>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-label">Words</div><div class="stat-val" id="stat-total">0</div></div>
      <div class="stat-card"><div class="stat-label">Sessions</div><div class="stat-val" id="stat-sessions">0</div></div>
      <div class="stat-card"><div class="stat-label">Streak</div><div class="stat-val" id="stat-streak">0</div></div>
    </div>
    <div class="start-wrap">
      <button class="start-btn" onclick="startSession()">Start today's lesson →</button>
      <div class="start-note" id="start-note"></div>
    </div>
  </div>

  <!-- FLASHCARD -->
  <div id="screen-fc" class="screen">
    <div class="fc-header">
      <button class="back-btn" onclick="goHome()">← Home</button>
      <div class="fc-count" id="fc-count">1 / 25</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="fc-bar" style="width:0%"></div></div>

    <div class="card-scene" onclick="flipCard()" id="card-scene">
      <div class="card" id="card">
        <!-- Front: English prompt -->
        <div class="card-face card-front">
          <div class="card-eyebrow">say it in French</div>
          <div class="card-word" id="card-en"></div>
          <div class="card-note" id="card-cat-front"></div>
        </div>
        <!-- Back: French answer -->
        <div class="card-face card-back">
          <div class="card-eyebrow">French</div>
          <div class="card-cat" id="card-cat"></div>
          <div class="card-word" id="card-fr"></div>
          <div class="card-note" id="card-note"></div>
        </div>
      </div>
    </div>

    <div class="tap-hint" id="tap-hint">Tap card to reveal</div>

    <div class="grade-row" id="grade-row" style="display:none">
      <button class="grade-btn missed" onclick="grade(false)">✗ Missed</button>
      <button class="grade-btn got-it" onclick="grade(true)">✓ Got it</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="screen-results" class="screen">
    <div class="results-wrap">
      <div class="results-done" id="res-done">Session done</div>
      <div class="results-meta" id="res-meta"></div>
      <div class="results-actions">
        <button class="results-btn" onclick="goHome()">← Home</button>
        <button class="results-btn" id="retry-btn" onclick="retryMissed()" style="display:none">Retry missed →</button>
      </div>
      <div class="missed-section" id="missed-section"></div>
    </div>
  </div>

</div>

const SESSION_SIZE = 25;

// ── Score system ───────────────────────────────────────────────
// Scores 0–4 stored in localStorage. Miss → score-1, Got it → score+1.
// Score → draw weight: 0=8  1=4  2=2  3=1  4=0.25
// New words default to score 1.
const SCORE_KEY = 'fr_scores_v1';
const WEIGHTS   = [8, 4, 2, 1, 0.25];

function loadScores() {
  try { return JSON.parse(localStorage.getItem(SCORE_KEY) || '{}'); }
  catch { return {}; }
}
function saveScores(s) { localStorage.setItem(SCORE_KEY, JSON.stringify(s)); }
function getScore(scores, fr) { return scores[fr] !== undefined ? scores[fr] : 1; }
function scoreLabel(s) { return ['🔴🔴🔴','🔴🔴','🔴','🟡','🟢'][Math.min(s,4)]; }

function getWeightedSelection(n) {
  const scores = loadScores();
  // Build weighted pool — repeat each word proportionally to its weight
  const pool = [];
  VOCAB.forEach(item => {
    const w = Math.round(WEIGHTS[Math.min(getScore(scores, item.fr), 4)] * 4);
    for (let i = 0; i < w; i++) pool.push(item);
  });
  // Sample unique words
  const shuffled = shuffle(pool);
  const seen = new Set(), result = [];
  for (const item of shuffled) {
    if (!seen.has(item.fr)) { seen.add(item.fr); result.push(item); }
    if (result.length === n) break;
  }
  // Pad if vocab is small
  if (result.length < n) {
    shuffle(VOCAB).filter(v => !seen.has(v.fr))
      .slice(0, n - result.length).forEach(v => result.push(v));
  }
  return result;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Persistence ────────────────────────────────────────────────
let sessions = parseInt(localStorage.getItem('fr_sessions') || '0');
let streak   = parseInt(localStorage.getItem('fr_streak')   || '0');
let lastDate = localStorage.getItem('fr_lastdate') || '';

function recordSession() {
  sessions++;
  localStorage.setItem('fr_sessions', sessions);
  const today = new Date().toDateString();
  if (lastDate !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (lastDate !== yesterday.toDateString()) streak = 0;
    streak++;
    lastDate = today;
    localStorage.setItem('fr_streak',  streak);
    localStorage.setItem('fr_lastdate', today);
  }
}

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  show('screen-home');
  updateHomeStats();
}

function updateHomeStats() {
  document.getElementById('stat-total').textContent    = VOCAB.length;
  document.getElementById('stat-sessions').textContent = sessions;
  const today = new Date().toDateString();
  if (lastDate && lastDate !== today) {
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
    if (lastDate !== yesterday.toDateString()) streak = 0;
  }
  document.getElementById('stat-streak').textContent = streak > 0 ? streak + ' 🔥' : '0';
  document.getElementById('start-note').textContent  =
    lastDate === new Date().toDateString() ? "You've already practiced today — nice work." : '';
}

// ── Session ────────────────────────────────────────────────────
let queue = [], qIdx = 0, missed = [], isRetry = false, flipped = false;

function startSession() {
  queue = getWeightedSelection(SESSION_SIZE);
  qIdx = 0; missed = []; isRetry = false;
  show('screen-fc');
  renderCard();
}

function retryMissed() {
  queue = shuffle([...missed]);
  qIdx = 0; missed = []; isRetry = true;
  show('screen-fc');
  renderCard();
}

function renderCard() {
  if (qIdx >= queue.length) { endSession(); return; }
  flipped = false;

  const item = queue[qIdx];
  document.getElementById('card-en').textContent       = item.en;
  document.getElementById('card-cat-front').textContent = item.cat;
  document.getElementById('card-fr').textContent       = item.fr;
  document.getElementById('card-cat').textContent      = item.cat;
  document.getElementById('card-note').textContent     = item.note || '';
  document.getElementById('fc-count').textContent      = (qIdx + 1) + ' / ' + queue.length;
  document.getElementById('fc-bar').style.width        = (qIdx / queue.length * 100) + '%';

  // Reset flip state
  const card = document.getElementById('card');
  card.classList.remove('flipped');
  document.getElementById('tap-hint').style.display  = 'block';
  document.getElementById('grade-row').style.display = 'none';
  document.getElementById('card-scene').style.pointerEvents = 'auto';
}

function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('tap-hint').style.display  = 'none';
  document.getElementById('grade-row').style.display = 'flex';
  // Disable further card taps once flipped
  document.getElementById('card-scene').style.pointerEvents = 'none';
}

function grade(correct) {
  const item   = queue[qIdx];
  const scores = loadScores();
  const prev   = getScore(scores, item.fr);
  scores[item.fr] = correct ? Math.min(prev + 1, 4) : Math.max(prev - 1, 0);
  saveScores(scores);
  if (!correct) missed.push({ ...item, score: scores[item.fr] });
  qIdx++;
  renderCard();
}

function endSession() {
  if (!isRetry) recordSession();
  show('screen-results');

  document.getElementById('res-done').textContent = isRetry ? 'Retry done' : 'Session done';
  document.getElementById('res-meta').textContent =
    missed.length === 0
      ? 'Clean session — nothing missed.'
      : missed.length + ' word' + (missed.length > 1 ? 's' : '') + ' to review.';

  document.getElementById('retry-btn').style.display = missed.length > 0 ? 'inline-block' : 'none';

  const sec = document.getElementById('missed-section');
  sec.innerHTML = '';
  if (missed.length > 0) {
    sec.innerHTML = '<div class="missed-label">Missed this session</div>';
    const sorted = [...missed].sort((a, b) => a.score - b.score);
    sorted.forEach(m => {
      sec.innerHTML += `
        <div class="missed-item">
          <div>
            <div class="missed-fr">${m.fr}</div>
            <div class="missed-en">${m.en}</div>
          </div>
          <div style="font-size:13px;flex-shrink:0">${scoreLabel(m.score)}</div>
        </div>`;
    });
  }
}

// ── Init ───────────────────────────────────────────────────────
updateHomeStats();

// ── Service worker: cache this page for offline use ────────────
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'francais-v1';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll([self.location.pathname])));
      self.skipWaiting();
    });
    self.addEventListener('activate', e => {
      e.waitUntil(caches.keys().then(keys =>
        Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
      ));
      self.clients.claim();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
